# Diogenes Production Configuration
# Optimized for performance and reliability

environment: "production"

api:
  debug: false
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://127.0.0.1:5173"

logging:
  level: "INFO"
  file: "logs/diogenes.log"

# Models — override via DIOGENES_LLM_MODELS_* env vars or default.yaml
llm:
  timeout: 180.0

# Longer cache TTLs for production
cache:
  provider: "sqlite"
  database: "data/cache.db"

session:
  provider: "sqlite"
  database: "data/sessions.db"
  ttl: 604800  # 7 days

agent:
  max_iterations: 3
  coverage_threshold: 0.75
