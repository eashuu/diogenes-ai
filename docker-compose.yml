services:
  # Diogenes API Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: diogenes-api:latest
    container_name: diogenes-api
    ports:
      - "8000:8000"
    environment:
      - DIOGENES_ENVIRONMENT=production
      - DIOGENES_SEARCH_BASE_URL=http://searxng:8080
      - DIOGENES_LLM_BASE_URL=${DIOGENES_LLM_BASE_URL:-http://host.docker.internal:11434}
      - DIOGENES_API_HOST=0.0.0.0
      - DIOGENES_API_PORT=8000
      # Set provider API keys via env vars:
      # - DIOGENES_LLM_OPENAI_API_KEY=sk-...
      # - DIOGENES_LLM_ANTHROPIC_API_KEY=sk-ant-...
      # - DIOGENES_LLM_GROQ_API_KEY=gsk_...
      # - DIOGENES_LLM_GEMINI_API_KEY=AI...
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - diogenes-data:/app/data
    depends_on:
      searxng:
        condition: service_healthy
    networks:
      - diogenes-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Diogenes Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    image: diogenes-frontend:latest
    container_name: diogenes-frontend
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - diogenes-network
    restart: unless-stopped

  # SearXNG - Privacy-focused meta search engine
  searxng:
    build:
      context: ./searxng
      dockerfile: Dockerfile
    image: diogenes-searxng:latest
    container_name: diogenes-searxng
    ports:
      - "8080:8080"
    environment:
      - BASE_URL=http://localhost:8080/
      - INSTANCE_NAME=Diogenes Search
    networks:
      - diogenes-network
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  # Ollama - Local LLM inference (optional)
  ollama:
    image: ollama/ollama:latest
    container_name: diogenes-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    networks:
      - diogenes-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - with-ollama
    restart: unless-stopped

volumes:
  ollama-data:
  diogenes-data:

networks:
  diogenes-network:
    driver: bridge
